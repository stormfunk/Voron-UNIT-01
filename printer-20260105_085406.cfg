#####################################################################
# Voron 0.1 Configuration for SKR Mini E3 V2.0 
# - Toolhead: "Dragon Burner" (Sherpa Micro extruder + Phaetus Dragon hotend)
# - Controller: BTT SKR Mini E3 V2.0 (STM32F103 MCU, TMC2209 drivers)
# - Firmware: Klipper (latest)
#####################################################################

# ====================== Include Additional Configs =======================
# The following lines pull in other config files for modular organization.
[include V0Display.cfg]      # Display config (Waveshare 12864 LCD and its MCU) – include if using the 12864 screen.
[include mainsail.cfg]       # Mainsail UI config (pause/resume/cancel macros, virtual SD, etc. for web interface).
[include macros.cfg]         # Custom macros (PRINT_START, PRINT_END, filament load/unload, M600, purge, park, etc.).
[include timelapse.cfg]      # Timelapse integration macros (for Moonraker's timelapse & Crowsnest webcam control).
[include config_backup.cfg]  # Backup of saved tuning (PID, Z offset, Input Shaper, etc. from prior calibrations).
# [include adxlmcu.cfg]      # (Optional) ADXL345 accelerometer on secondary MCU for resonance testing (disabled).
# [include homing.cfg]       # (Optional) Separate custom homing file (if any, currently not used).

# ====================== Global Printer Settings =========================
[exclude_object]  # Enable the "Exclude Object" module (allows cancelling specific printed objects mid-print:contentReference[oaicite:2]{index=2}).

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_34FFD9053039423526610543-if00
# Primary MCU (SKR Mini E3 V2) connection. Use the unique serial ID from /dev/serial/by-id.
# (On the Raspberry Pi, run `ls /dev/serial/by-id/` to find your board's ID.)

[mcu rpi]
serial: /tmp/klipper_host_mcu
# Secondary MCU: the Raspberry Pi itself (uses Klipper's "host mcu"). 
# This is used for things like directly attaching an ADXL345 accelerometer to the Pi for input shaping measurements.

[printer]
kinematics: corexy
max_velocity: 700        # Maximum XY movement speed (mm/s). High for V0.1 (fast travel moves).
max_accel: 7000          # Maximum acceleration (mm/s^2) for printing moves (tuned high for rapid moves; was 12000 in testing).
max_z_velocity: 30       # Z-axis max speed (mm/s) – limited due to lead screw.
max_z_accel: 500         # Z-axis max acceleration (mm/s^2).
square_corner_velocity: 10.0  # Cornering speed (mm/s) before slowdown. Higher than default (5) due to input shaping usage:contentReference[oaicite:3]{index=3}.
# CoreXY kinematics: X and Y steppers move in tandem. Ensure belts are correctly crossed per Voron design.

[force_move]
enable_force_move: True
# Allows use of G-code commands like FORCE_MOVE and SET_KINEMATIC_POSITION. 
# Enabling this permits moving motors even if the printer isn't homed or if endstops are triggered (useful for certain calibration or recovery procedures:contentReference[oaicite:4]{index=4}).

# ====================== Temperature Sensors =============================
[temperature_sensor chamber]
sensor_type: Generic 3950
sensor_pin: PA7
pullup_resistor: 10000
# Chamber/ambient temperature sensor (if installed).
# Using a 100K NTC thermistor (Beta=3950) on pin PA7 of the SKR Mini (requires an available analog pin).
# Provides chamber temperature reading (e.g., for monitoring enclosure heat).

#####################################################################
#  X/Y Axis Stepper Motors (CoreXY motion)
#####################################################################
[stepper_x]
step_pin: PB13
dir_pin: PB12
enable_pin: !PB14
rotation_distance: 40        # 40 mm per motor rotation for X/Y (GT2 belt with 20-tooth pulley: 2 mm * 20 teeth = 40 mm).
microsteps: 64               # Microstepping for X (higher microsteps can smooth motion at cost of max speed).
full_steps_per_rotation: 200 # 200 for 1.8° stepper motors (use 400 if you have 0.9° steppers).
endstop_pin: ^PC0
position_endstop: 120        # X endstop at X=120 mm (X axis length ~120 mm).
position_max: 120            # Maximum X travel.
homing_speed: 100            # X homing speed in mm/s (after initial tuning, increased up to 100 mm/s; start slow if uncertain).
homing_retract_dist: 5       # Backoff distance for second home.
homing_positive_dir: true    # Home towards the max endstop (Voron0 has endstops at max X/Y).

# Note: If X moves in the wrong direction when homing, invert the dir_pin by prefixing with '!' (e.g., dir_pin: !PB12).

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
interpolate: False
run_current: 0.5             # X motor current in amps (0.5A). Adjust if motor skips or runs hot (depends on motor rated current).
sense_resistor: 0.110
stealthchop_threshold: 999999 
# TMC2209 driver in UART mode for X.
# stealthchop_threshold: 999999 to enable StealthChop for all speeds on X (quiet operation). 
# Set to 0 to disable StealthChop and use SpreadCycle (noisier but more torque).

[stepper_y]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
rotation_distance: 40        # Same as X: 40 mm per rotation for GT2 20T pulley.
microsteps: 64
full_steps_per_rotation: 200 # 1.8° stepper (200 steps per rev).
endstop_pin: ^PC1
position_endstop: 120        # Y endstop at Y=120 mm.
position_max: 120            # Max Y travel.
homing_speed: 100            # Y homing speed (up to 100 mm/s).
homing_retract_dist: 5
homing_positive_dir: true    # Home towards max Y.

# Invert Y direction if needed by adding '!' to dir_pin (PB2).

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
interpolate: False
run_current: 0.5             # Y motor current (0.5A).
sense_resistor: 0.110
stealthchop_threshold: 999999 
# Y uses the same UART pins (shared TX/RX lines) with address 2. StealthChop enabled (999999 threshold).
# Note: X and Y currents 0.5A are relatively low because V0 uses small motors and light axes. Increase if skipping occurs, but monitor thermals.

#####################################################################
#  Z Axis Stepper Motor (Leadscrew)
#####################################################################
[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
rotation_distance: 8.0         # Leadscrew travel per full rotation (T8x8 integrated leadscrew = 8 mm/rev).
microsteps: 32
full_steps_per_rotation: 200   # (implicitly, 1.8° motor, though for Z we rely on rotation_distance for accuracy).
endstop_pin: ^PC2
#position_endstop: 0.585       # Z endstop trigger position (offset) after calibration. A negative value means the switch triggers before nozzle touches bed by ~0.085 mm.
position_max: 120              # Max Z travel (build height).
position_min: -1.5             # Allow Z to go a bit below 0 (for slight overtravel if needed).
homing_speed: 10               # Slower Z homing (bed moves up) to avoid crashing.
second_homing_speed: 5.0       # Even slower second pass for Z homing for accuracy.
homing_retract_dist: 5.0       # Bed retract distance after first Z switch trigger.

# Note: Remove the '!' in front of PC5 (dir_pin) if Z moves in the wrong direction (i.e., if bed moves down instead of up when homing).

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
interpolate: False
run_current: 0.2              # Z motor current (0.2A). Low because the integrated Z motor is small (OMC 0.4A stepper uses ~0.2A nicely:contentReference[oaicite:5]{index=5}; use ~0.37A if using an LDO 1.0A motor).
sense_resistor: 0.110
stealthchop_threshold: 999999 
# Z uses StealthChop as well (for quiet Z motion). SpreadCycle generally not needed on Z since speeds are low.
# If Z skipping occurs (unlikely at these speeds), consider raising current or disabling stealthchop.

#####################################################################
#  Extruder (Sherpa Micro) and Hotend (Phaetus Dragon)
#####################################################################
[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD2
# Motor configuration for Sherpa Micro extruder:
# Sherpa Micro uses a planetary gear or hob gear reduction (~5:1). It has a 50-tooth ring gear and a 10-tooth motor pinion.
# gear_ratio below is 50:10, corresponding to 5:1 gearing:contentReference[oaicite:6]{index=6}.

gear_ratio: 50:10            # Gear ratio of Sherpa Micro (50:10 teeth = 5:1 reduction). 
rotation_distance: 22.796    # Calibrated filament travel per rotation, in mm. 
                             # This value was fine-tuned (e.g., via extruding 100 mm calibration) for accurate E-steps.
# (For reference, stock calculation for 5:1 with 1.75mm filament often ~22.8 mm/rotation. Adjust as needed for precise extrusion.)

microsteps: 32
# full_steps_per_rotation: 200  # (Optional) 1.8° extruder motor, 200 steps, or 400 if using a 0.9° extruder motor. 
                                 # Not needed since rotation_distance is used, but listed for clarity.

nozzle_diameter: 0.400
filament_diameter: 1.750
# Nozzle and filament specs (0.4 mm nozzle, 1.75 mm filament). Used by Klipper for flow rate calculations in some features.

heater_pin: PC8
sensor_type: ATC Semitec 104NT-4-R025H42G  # Thermistor type for Phaetus Dragon hotend (Semitec 104NT-4 a.k.a 104GT-2).
sensor_pin: PA0
# The Dragon hotend’s thermistor is set as Semitec 104NT-4, common in E3D and Dragon hotends, accurate up to ~300°C:contentReference[oaicite:7]{index=7}.
# If your thermistor differs (e.g., 100K 3950), change sensor_type accordingly. Ensure this matches your actual hotend thermistor.

min_temp: 0
max_temp: 280       # Max hotend temp (°C). Dragon hotend can technically handle higher with appropriate sensor, but 280°C is a safe limit for this thermistor and typical use.
min_extrude_temp: 150    # Prevent extrusion below 150°C to avoid cold extrusion.
max_extrude_only_distance: 150
max_extrude_cross_section: 0.8
# Extrusion safeguards: don't extrude more than 150mm in one command, and restrict extrusion if nozzle is partially clogged (cross-section check).

pressure_advance: 0.024
pressure_advance_smooth_time: 0.040
# Pressure Advance compensation to reduce filament ooze and improve corners. 
# Value 0.024 was tuned for this direct-drive setup (Sherpa Micro). A lower PA is expected for direct extruders (less lag than Bowden).
# smooth_time 0.04s is default, smoothing out the PA effect.

# PID control for hotend (tuned values):
control: pid
pid_Kp: 27.534
pid_Ki: 1.293
pid_Kd: 146.619
# These PID coefficients were obtained via PID tuning (e.g., using `PID_CALIBRATE` or `SET PID_TUNING`). 
# They ensure stable hotend temperatures. Always perform a PID tune after major changes to hotend or cooling.

# If using a different extruder motor:
#  - For LDO 36STH17-1004AHG (1.0A pancake motor), 0.3A run_current (as set) is a good starting point:contentReference[oaicite:8]{index=8}.
#  - For larger motors (e.g., LDO 36STH20, 1.0A but larger), up to ~0.5-0.6A may be needed:contentReference[oaicite:9]{index=9}.

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
interpolate: False
run_current: 0.5        # Extruder motor current (A). Set to 0.30A for the LDO 36STH17 pancake motor (rated ~1A) – provides enough torque without overheating.
sense_resistor: 0.110
stealthchop_threshold: 0 
# Extruder uses SpreadCycle (stealthchop_threshold 0) to ensure consistent torque. StealthChop is avoided on extruder to prevent skipping under load:contentReference[oaicite:10]{index=10}.
# If the extruder is noisy and you wish to try StealthChop, you can set a high threshold, but be cautious about missed steps on retraction.

#####################################################################
#  Bed Heater 
#####################################################################
[heater_bed]
heater_pin: PC9
sensor_type: ATC Semitec 104GT-2    # Bed thermistor type (e.g., 104GT-2, common 100K thermistor for bed).
sensor_pin: PC3
smooth_time: 3.0
min_temp: 0
max_temp: 120      # Bed max temp (°C). 120°C for ABS prints; adjust if using higher-temp bed materials.
pwm_cycle_time: 0.02506   # ~39.9 Hz PWM frequency for bed heater. Lower frequency helps if using an SSR or to reduce electrical noise.
# max_power: 0.6           # (Commented) If using a very powerful bed (e.g., 100W in a small bed), limit max power to 60% to avoid overshoot or PSU strain.

# PID control for bed (tuned values):
control: pid
pid_Kp: 66.166
pid_Ki: 3.501
pid_Kd: 312.633
# PID values tuned for the bed heater. Having PID on the bed can maintain more stable temperatures than bang-bang, especially in an enclosure.

#####################################################################
#  Nozzle Brush Servo (for automatic nozzle wiping, if installed)
#####################################################################
[servo brush_servo]
pin: PA8
maximum_servo_angle: 95       # The servo's usable range (0-95 degrees) for brush mechanism.
minimum_pulse_width: 0.0005   # Pulse width corresponding to 0° (500 µs).
maximum_pulse_width: 0.001575 # Pulse width for 95° (1575 µs). Tune if servo doesn't reach desired position.
initial_angle: 2.5            # Initial angle at Klipper start (degrees). 2.5° here effectively retracts the brush.

# This servo controls a nozzle cleaning brush (e.g., swings it in/out).
# The angles and pulse widths are calibrated so that:
# - At ~0° (2.5 initial), the brush is retracted/away from nozzle.
# - At ~95°, the brush is fully deployed to contact the nozzle.
# Adjust angles if needed to match your brush mechanism's range.

#####################################################################
#  Fans (Hotend and Part Cooling)
#####################################################################
[heater_fan hotend_fan]
pin: PC7
max_power: 1.0
kick_start_time: 0.4
heater: extruder
heater_temp: 50.0
fan_speed: 1.0   # Hotend fan speed (keep commented to run at full power by default when hot). 
# For a 2-wire 24V DC blower, it's recommended to run at 100% to ensure cooling. 
# (Many small blower fans won't run reliably at low PWM duty unless they're 4-wire PWM fans with a control wire.)
# This fan turns on when extruder >50°C. kick_start_time gives it 0.4s of full power to overcome stall at start.

[fan]
pin: PC6
max_power: 1.0
kick_start_time: 0.5
off_below: 0.13
cycle_time: 0.010
# Part cooling fan (print cooling) on pin PC6. This is the fan controlled by M106/M107 in G-code.
# Settings:
# - kick_start_time: spin-up blast (0.5s) to ensure the fan starts.
# - off_below: 13% -> any fan speed command under 13% will be treated as off (fan likely stalls below this voltage).
# - cycle_time: 0.01 = 100 Hz PWM, to reduce fan whining.
# Use the slicer or UI to adjust this fan during prints for cooling filament as needed.

# Note: If you have an auxiliary electronics or chamber fan on a constant 24V or manual switch, it's not controlled by Klipper and thus not listed here. 
# Ensure any always-on fans are properly wired. If you prefer to control an extra fan via Klipper, use a spare MOSFET pin and add a [fan] or [output_pin] section.

#####################################################################
#  Homing and Calibration
#####################################################################
[idle_timeout]
timeout: 1800
# If the printer is idle for 1800s (30 minutes) without any commands, Klipper will disable steppers (motors release). 
# Adjust or disable if you want steppers to stay energized or to conserve energy sooner.

# Bed screw adjustment (manual bed leveling) – coordinates of bed leveling screws:
[bed_screws]
screw1: 60, 5       # front center screw (X=60, Y=5)
screw1_name: Front
screw2: 5, 115      # back left screw
screw2_name: Back-Left
screw3: 115, 115    # back right screw
screw3_name: Back-Right
# Use the BED_SCREWS_ADJUST command in Klipper (e.g., via mainsail "Screws" plugin) to assist manual leveling.
# The printer will move the nozzle above each screw for adjustment in the order listed.

# (The above [bed_screws] section is used by the BED_SCREWS_ADJUST routine to help level the bed by turning screws while the nozzle is used as a reference.)

#####################################################################
#  Input Shaping (Resonance Compensation)
#####################################################################
[input_shaper]
shaper_type_x: ei
shaper_freq_x: 97.4
shaper_type_y: mzv
shaper_freq_y: 64.6
# Klipper Input Shaping to reduce ringing (vibrations) on X and Y axes.
# The values above were determined via resonance testing (e.g., using an ADXL345 accelerometer or manual ringing tower tests).
# - X axis uses EI shaper at ~97 Hz.
# - Y axis uses MZV shaper at ~64 Hz.
# Different shaper types were selected per axis based on measured frequency response (this is not uncommon; X and Y may benefit from different shaper models).
# These settings dynamically smooth accelerations to cancel out vibrations at the given frequencies:contentReference[oaicite:11]{index=11}:contentReference[oaicite:12]{index=12}.
# Keep these in sync with your machine's measured resonances. If you change belts, motor, or frame, consider recalibrating.
# (If no accelerometer is available, you can use manual test prints to tune these.)

#####################################################################
#  User Interface and Controls
#####################################################################
# If using a Waveshare 12864 LCD with its own microcontroller:
#  - The [include V0Display.cfg] at top brings in configuration for an MCU named 'display' and a [display] section to drive the LCD and knobs.
#  - The display's MCU typically connects via USB (or serial) to the Pi; ensure the serial in V0Display.cfg matches.
# If NOT using the 12864 display (e.g., using Mainsail web or a HDMI/DSI screen with KlipperScreen), you can comment out the V0Display.cfg include to disable it. 
# In that case, Klipper will rely on the web interface (Mainsail) or KlipperScreen for control, and [display_status] (from mainsail.cfg) will provide status messages.

# Mainsail / KlipperScreen:
# - Mainsail (web interface) is enabled via mainsail.cfg include. It provides the UI, macros (pause/resume), virtual SD, and webcam interface.
# - Moonraker (the API server) handles remote access. Ensure Moonraker is configured for your network/remote needs (like authorizing external access if needed).
# - If using a local touchscreen with KlipperScreen, install it on the Pi; no extra config in printer.cfg is needed beyond what's here (KlipperScreen reads Klipper/Moonraker status directly).
# - The [pause_resume] and macros for PAUSE, RESUME, CANCEL are defined in mainsail.cfg:contentReference[oaicite:13]{index=13}. They include toolhead parking logic so that on a pause or cancel, the nozzle moves away safely.
# - A macro `_TOOLHEAD_PARK_PAUSE_CANCEL` is used (in mainsail.cfg) to handle parking the nozzle at a safe spot on pause/cancel. It moves the toolhead up and out of the way and stores the current extruder position for resuming:contentReference[oaicite:14]{index=14}:contentReference[oaicite:15]{index=15}.

# Filament Change Macro (M600) and Purge/Park:
# If you want to do filament changes (e.g., color changes mid-print via M600 G-code):
# Typically, one defines an M600 macro that triggers a pause and moves nozzle for filament swap. 
# For example, in macros.cfg you might have:
# [gcode_macro M600]
# gcode:
#   PAUSE
#   # (Additional moves or retracts can be added here if needed for filament removal)
# By default, many use just PAUSE since the PAUSE macro (from mainsail.cfg) already parks the head and waits.
# You can customize it to retract filament more, raise Z higher, etc., then resume when ready.
#
# Purge macros: You may have macros like PURGE or PRIME in macros.cfg to extrude some filament (e.g., to purge old color or prime nozzle before printing).
# These would use G1 commands to extrude at a safe location (perhaps on a side purge bucket or a purge line on bed).
# Example (for a purge line at print start) could move to bed edge and extrude filament.
#
# Park macro: If you want a manual park (aside from pause), you can create a macro to move the toolhead to a given coordinate (e.g., park at X60 Y120 Z150). 
# However, since PAUSE already does parking via _TOOLHEAD_PARK, a separate PARK macro might simply call that logic.
#
# Refer to your macros.cfg for actual implementations and adjust comments there for clarity on what each macro does (PRINT_START, PRINT_END, etc. should be documented in that file as well).

# Webcam and Timelapse integration:
# The included timelapse.cfg likely contains macros like TIMELAPSE_TAKE_FRAME, etc., which coordinate with Moonraker's timelapse plugin.
# Typically, TIMELAPSE_TAKE_FRAME will move the toolhead out of the way (park) and call an action to capture a frame (via {action_call_remote_method('timelapse_take_frame')} or similar).
# After the print, TIMELAPSE_RENDER might be invoked to compile images into a video.
# Make sure in Moonraker's configuration (usually moonraker.conf on the Pi) you have timelapse and possibly Crowsnest (webcam service) set up. 
# Crowsnest handles the webcam stream configuration; it’s not configured in Klipper but via Moonraker. Ensure your camera is accessible and defined for the UI.
# The macros in timelapse.cfg are commented to explain how they park the head, capture frames, and resume the print after each layer or interval.
#
# For remote access, Moonraker can be paired with services like Obico or accessed through a VPN for outside-network control. Ensure to secure your Moonraker with a password/token if exposing it.

